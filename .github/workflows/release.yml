name: Release

# Single-step release pipeline (manual dispatch).
#
# Jobs:
#   build    – validates the extension compiles and packages correctly.
#   release  – bumps the version, updates CHANGELOG.md, commits directly to
#              master, creates the git tag, and uploads the packaged extension.
#   publish  – publishes to the VS Code Marketplace and creates a GitHub
#              Release. Uses the optional "publish" GitHub Environment so that
#              adding required reviewers to that environment provides a manual
#              approval gate before the Marketplace publish.

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (e.g. 1.2.3). Overrides version_type when provided.'
        required: false
        type: string

jobs:
  build:
    name: Validate build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out kusto-syntax-highlighting.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: kusto-syntax-highlighting-vsix
          path: kusto-syntax-highlighting.vsix
          retention-days: 30

  release:
    name: Bump version, tag, and package
    needs: build
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.new_version.outputs.version }}
      tag: ${{ steps.new_version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate custom version
        if: ${{ inputs.custom_version != '' }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "${{ inputs.custom_version }}" ]; then
            echo "::error::Version '${{ inputs.custom_version }}' is already the current version in package.json. Please specify a different version."
            exit 1
          fi

      - name: Bump version (custom)
        if: ${{ inputs.custom_version != '' }}
        run: npm version ${{ inputs.custom_version }} --no-git-tag-version

      - name: Bump version (preset)
        if: ${{ inputs.custom_version == '' }}
        run: npm version ${{ inputs.version_type }} --no-git-tag-version

      - name: Read new version
        id: new_version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Collect commits since last tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges > /tmp/commits.txt
          else
            git log --pretty=format:"- %s" --no-merges > /tmp/commits.txt
          fi

      - name: Update CHANGELOG
        env:
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          export TODAY
          TODAY=$(date +%Y-%m-%d)

          cat > /tmp/update_changelog.js << 'JSEOF'
          const fs = require('fs');
          const newVersion = process.env.NEW_VERSION;
          const today = process.env.TODAY;
          const rawCommits = fs.existsSync('/tmp/commits.txt')
            ? fs.readFileSync('/tmp/commits.txt', 'utf8').trim()
            : '';

          // Exclude chore commits (e.g. previous version bumps) from the log
          const commitLines = rawCommits
            .split('\n')
            .filter(l => l.trim() && !l.match(/^- chore:/i));

          let content = fs.readFileSync('CHANGELOG.md', 'utf8');

          // Extract [Unreleased] section body.
          // Match up to the next versioned ## [ heading, or to end of file if
          // [Unreleased] is the only section (no 'm' flag so \s*$ means end of string).
          const unreleasedMatch = content.match(/## \[Unreleased\]([\s\S]*?)(?=\n## \[|\s*$)/);
          const unreleasedBody = unreleasedMatch ? unreleasedMatch[1].trim() : '';

          // Build the new version section
          const parts = [`## [${newVersion}] - ${today}`];
          if (unreleasedBody) {
            parts.push(unreleasedBody);
          }
          if (commitLines.length > 0) {
            const heading = unreleasedBody ? '### Commits Since Last Release' : '### Changes';
            parts.push(`${heading}\n${commitLines.join('\n')}`);
          }
          if (parts.length === 1) {
            parts.push('_No notable changes._');
          }

          const newVersionSection = parts.join('\n\n');

          // Replace the [Unreleased] section with a blank one, then insert the
          // new versioned section directly below it
          const newContent = content.replace(
            /## \[Unreleased\][\s\S]*?(?=\n## \[|\s*$)/,
            `## [Unreleased]\n\n${newVersionSection}\n\n`
          );

          fs.writeFileSync('CHANGELOG.md', newContent);
          console.log(`CHANGELOG.md updated for v${newVersion}`);
          JSEOF

          node /tmp/update_changelog.js

      - name: Compile TypeScript
        run: npm ci && npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out kusto-syntax-highlighting.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: kusto-syntax-highlighting-vsix-release
          path: kusto-syntax-highlighting.vsix

      - name: Commit version bump, tag, and push
        env:
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          TAG="v${NEW_VERSION}"

          # Abort if the tag already exists to prevent overwriting a previous release.
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists on remote. Aborting to prevent overwriting a release."
            exit 1
          fi

          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${NEW_VERSION}"

          # Rebase onto the latest master to handle any commits that landed after
          # this workflow checked out the repository, so the tag points at the
          # final, rebased release commit.
          git pull --rebase origin master

          # Create the tag locally after rebasing so that master commit and tag
          # are pushed together in one atomic operation.
          git tag "$TAG"
          git push --atomic origin master "refs/tags/${TAG}"

  publish:
    name: Publish to Marketplace and create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    # The "publish" environment enables an optional manual approval gate.
    # If the environment is not configured, this job runs immediately after
    # "release" completes.
    environment: publish
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: kusto-syntax-highlighting-vsix-release

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath kusto-syntax-highlighting.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: kusto-syntax-highlighting.vsix
          generate_release_notes: true
