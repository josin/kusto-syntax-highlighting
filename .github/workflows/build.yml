name: Build

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Validate build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out kusto-syntax-highlighting.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kusto-syntax-highlighting-vsix
          path: kusto-syntax-highlighting.vsix
          retention-days: 30
