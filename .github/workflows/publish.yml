name: Publish Extension

# Stage 3 of the pipeline (automatic promotion from Stage 2).
#
# Triggered when a release/vX.Y.Z branch is merged into master (i.e. the release
# PR opened by the Release workflow is approved and merged).
#
# Jobs:
#   prepare  – verifies the version, creates the git tag, builds and packages
#              the extension. Runs without any approval gate.
#   publish  – publishes to the VS Code Marketplace and creates a GitHub
#              Release. Uses the "publish" GitHub Environment so that adding
#              required reviewers to that environment provides an optional
#              manual approval gate before the Marketplace publish.

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  prepare:
    name: Tag and build VS Code extension
    # Only run when a release/vX.Y.Z PR is merged (not just closed)
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Pin to the merge commit so the tag is placed on the exact commit
          # that landed on master, not an ambiguous PR head ref.
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches release branch
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          ACTUAL=$(node -p "require('./package.json').version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Branch name implies v${EXPECTED} but package.json contains v${ACTUAL}. Aborting."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists on remote. Aborting to prevent overwriting a release."
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Compile TypeScript
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out kusto-syntax-highlighting.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: kusto-syntax-highlighting-vsix
          path: kusto-syntax-highlighting.vsix

  publish:
    name: Publish to Marketplace and create GitHub Release
    needs: prepare
    runs-on: ubuntu-latest
    # The "publish" environment enables an optional manual approval gate.
    # If the environment is not configured, this job runs immediately after
    # "prepare" completes. Tagging and build (in "prepare") are unaffected.
    environment: publish
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: kusto-syntax-highlighting-vsix

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath kusto-syntax-highlighting.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: kusto-syntax-highlighting.vsix
          generate_release_notes: true
